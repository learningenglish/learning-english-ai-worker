name = "learning-english-ai-proxy"
main = "worker.js"
compatibility_date = "2024-01-01"

# Sau khi chạy: wrangler kv namespace create RATE_LIMIT_KV
# dán "id" được trả về vào dòng bên dưới
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# API key và app secret KHÔNG khai báo ở đây. Set bằng lệnh:
#   wrangler secret put OPENAI_API_KEY
#   wrangler secret put APP_SECRET
# (APP_SECRET là một chuỗi ngẫu nhiên bạn tự đặt, ví dụ: openssl rand -hex 32)
